<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>親指シフト系 かな入力 練習</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --key-bg: #252545;
      --key-border: #3a3a5a;
      --text: #f8f8f2;
      --text-dim: #6272a4;
      --yellow: #f1fa8c;
      --green: #50fa7b;
      --blue: #8be9fd;
      --red: #ff5555;
      --orange: #ffb86c;
      --purple: #bd93f9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.9rem;
      color: var(--purple);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .screen { width: 100%; max-width: 860px; }

    /* ── Layout selector ── */
    .layout-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .layout-btn {
      padding: 6px 18px;
      border-radius: 8px;
      border: 1px solid var(--key-border);
      background: var(--key-bg);
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      transition: all 0.12s;
    }
    .layout-btn:hover { border-color: var(--purple); color: var(--text); }
    .layout-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #1a1a2e;
      font-weight: bold;
    }
    .layout-desc {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 14px;
      padding: 6px 10px;
      background: var(--surface);
      border-radius: 6px;
      border-left: 3px solid var(--purple);
    }

    /* ── Menu ── */
    .size-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      color: var(--text-dim);
    }
    .size-row button {
      padding: 4px 14px;
      border-radius: 6px;
      border: 1px solid var(--key-border);
      background: var(--key-bg);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .size-row button.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #1a1a2e;
      font-weight: bold;
    }

    .menu-section { margin-bottom: 18px; }
    .menu-sec-hd {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--key-border);
      padding-bottom: 4px;
      margin-bottom: 10px;
    }

    .lesson-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .lesson-btn {
      background: var(--surface);
      border: 1px solid var(--key-border);
      color: var(--text);
      padding: 13px 15px;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.12s, border-color 0.12s;
    }
    .lesson-btn:hover { background: var(--surface2); border-color: var(--purple); }
    .lesson-btn.primary { border-color: var(--purple); }
    .lesson-num { color: var(--purple); font-weight: bold; font-size: 1.05rem; margin-right: 8px; }
    .lesson-best { font-size: 0.72rem; color: var(--text-dim); margin-top: 4px; }

    .text-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .text-btn {
      background: var(--surface);
      border: 1px solid var(--key-border);
      color: var(--text);
      padding: 11px 15px;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      font-size: 0.88rem;
      transition: background 0.12s, border-color 0.12s;
    }
    .text-btn:hover { background: var(--surface2); border-color: var(--blue); }
    .text-preview {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .text-len { font-size: 0.68rem; color: var(--text-dim); }

    /* ── Practice ── */
    .prac-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .prac-title { font-size: 0.9rem; color: var(--text-dim); }
    .prac-progress { font-size: 0.88rem; color: var(--text-dim); }

    .progress-bar-bg {
      height: 3px;
      background: var(--key-bg);
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--purple);
      border-radius: 2px;
      transition: width 0.25s;
    }

    .text-ctx-box {
      background: var(--surface);
      border: 1px solid var(--key-border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1.25rem;
      line-height: 2;
      word-break: break-all;
      margin-bottom: 10px;
    }
    .tc-done { color: var(--text-dim); }
    .tc-cur {
      color: var(--yellow);
      font-weight: bold;
      background: #2d2b15;
      border-radius: 3px;
      padding: 0 2px;
      outline: 2px solid var(--yellow);
      outline-offset: 1px;
    }
    .tc-todo { color: var(--text); }

    .challenge-box {
      background: var(--surface);
      border: 2px solid var(--key-border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s;
    }
    .challenge-box.ok  { border-color: var(--green); }
    .challenge-box.err { border-color: var(--red); }

    .target-kana {
      font-size: 4.5rem;
      line-height: 1;
      color: var(--yellow);
      margin-bottom: 10px;
    }

    .hint-text {
      font-size: 0.88rem;
      color: var(--text-dim);
      min-height: 22px;
      text-align: center;
      margin-bottom: 8px;
    }

    .text-ctx-box.text-large {
      font-size: 1.7rem;
      line-height: 2.1;
      padding: 18px 22px;
    }
    .hk {
      display: inline-block;
      background: var(--key-bg);
      border: 1px solid var(--key-border);
      border-radius: 4px;
      padding: 1px 7px;
      color: var(--text);
      margin: 0 2px;
      font-size: 0.82rem;
    }

    /* Thumb indicators */
    .thumb-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .thumb-ind {
      padding: 5px 16px;
      border-radius: 6px;
      border: 1px solid var(--key-border);
      background: var(--key-bg);
      font-size: 0.8rem;
      color: var(--text-dim);
      transition: all 0.08s;
      user-select: none;
    }
    .thumb-ind.lit-left  { background: #3d2000; border-color: var(--orange); color: var(--orange); font-weight: bold; }
    .thumb-ind.lit-right { background: #003040; border-color: var(--blue);   color: var(--blue);   font-weight: bold; }
    .thumb-ind.req       { border-width: 2px; }

    /* ── Keyboard ── */
    #keyboard {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
      user-select: none;
    }
    .kb-row { display: flex; gap: 4px; justify-content: center; }

    .kb-key {
      position: relative;
      width: 50px;
      height: 52px;
      border-radius: 6px;
      background: var(--key-bg);
      border: 1px solid var(--key-border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      transition: background 0.08s, border-color 0.08s;
      flex-shrink: 0;
    }
    .kb-phys {
      position: absolute;
      top: 2px; right: 3px;
      font-size: 0.55rem;
      color: #8888aa;
      font-family: monospace;
    }
    .kb-l {
      position: absolute;
      top: 3px; left: 4px;
      font-size: 0.62rem;
      color: var(--orange);
      line-height: 1;
    }
    .kb-n { font-size: 1.05rem; color: var(--text); line-height: 1; }
    .kb-r {
      position: absolute;
      bottom: 3px; right: 4px;
      font-size: 0.62rem;
      color: var(--blue);
      line-height: 1;
    }

    /* center-shift layout: shift char in top-right */
    .kb-key.cs .kb-r {
      top: 3px; bottom: auto;
      left: auto; right: 4px;
    }

    .kb-key.tgt { border-color: var(--yellow) !important; background: #2d2b15 !important; }
    .kb-key.tgt.m-n .kb-n { color: var(--yellow); font-size: 1.2rem; }
    .kb-key.tgt.m-l .kb-l { color: var(--yellow); font-size: 0.75rem; font-weight: bold; }
    .kb-key.tgt.m-r .kb-r { color: var(--yellow); font-size: 0.75rem; font-weight: bold; }

    .kb-key.hl-left  { background: #301800 !important; border-color: var(--orange) !important; }
    .kb-key.hl-right { background: #001e2e !important; border-color: var(--blue)   !important; }

    .kb-key.fl-ok  { background: #0f3020 !important; border-color: var(--green) !important; }
    .kb-key.fl-err { background: #3a1010 !important; border-color: var(--red)   !important; }

    /* Combo modifier key (e.g. 薙刀式 T/Y keys) */
    .kb-key.kb-combo {
      border-color: var(--red);
      background: #2a0a0a;
    }
    .kb-key.kb-combo .kb-n {
      font-size: 0.65rem;
      color: var(--red);
    }
    .kb-key.kb-combo.tgt {
      border-color: var(--yellow) !important;
      background: #2d2b15 !important;
    }
    .kb-key.kb-combo.tgt .kb-n { color: var(--yellow); }

    /* Empty key (no kana in current layout) */
    .kb-key.kb-empty {
      opacity: 0.3;
    }

    .kb-key.k-thumb {
      width: 76px; height: 38px;
      font-size: 0.72rem; color: var(--text-dim);
      flex-direction: column; gap: 1px;
    }
    .kb-key.k-thumb small { font-size: 0.6rem; color: #8888aa; }
    .kb-key.k-space {
      width: 240px; height: 38px;
      font-size: 0.72rem; color: #555;
      pointer-events: none;
    }

    .sess-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      font-size: 0.88rem;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .sess-stats b { color: var(--text); }

    .ctrl-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid var(--key-border);
      background: var(--key-bg);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.88rem;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn:hover { background: var(--surface2); border-color: var(--purple); }
    .btn.primary { background: var(--purple); border-color: var(--purple); color: #1a1a2e; font-weight: bold; }
    .btn.primary:hover { filter: brightness(1.1); }

    /* ── Stats screen ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--key-border);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      margin-bottom: 18px;
    }
    .result-card h2 { font-size: 1.4rem; color: var(--purple); margin-bottom: 22px; }
    .big-nums { display: flex; justify-content: center; gap: 40px; margin-bottom: 18px; }
    .big-num-val { font-size: 2.8rem; font-weight: bold; color: var(--yellow); }
    .big-num-lbl { font-size: 0.8rem; color: var(--text-dim); }
    .result-sub { font-size: 0.88rem; color: var(--text-dim); margin-bottom: 16px; }
    .err-box { background: var(--key-bg); border-radius: 8px; padding: 14px 16px; text-align: left; }
    .err-box h3 { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 10px; }
    .err-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border-radius: 4px;
      padding: 4px 10px;
      margin: 3px;
      font-size: 0.95rem;
    }
    .err-cnt { color: var(--red); font-size: 0.78rem; }

    #ime-warn {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #c0392b;
      color: #fff;
      text-align: center;
      padding: 9px;
      font-size: 0.9rem;
      z-index: 999;
    }

    /* ── CPM chart ── */
    .chart-wrap {
      margin: 14px 0;
      background: var(--surface);
      border: 1px solid var(--key-border);
      border-radius: 10px;
      padding: 12px 14px 8px;
    }
    .chart-hd {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    #cpm-chart {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    /* ── Weakness drill ── */
    .weak-chips { margin: 8px 0 10px; min-height: 28px; }
    .weak-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border-radius: 4px;
      padding: 3px 9px;
      margin: 2px;
      font-size: 1rem;
    }
    .weak-cnt { color: var(--red); font-size: 0.72rem; }
    .weak-none { font-size: 0.82rem; color: var(--text-dim); }
  </style>
</head>
<body>

<div id="ime-warn">⚠ IMEがオンです。半角/全角キーを押してIMEをオフにしてから練習してください。</div>

<!-- ══════════ MENU ══════════ -->
<div id="screen-menu" class="screen">
  <h1 id="menu-title">かな入力 練習</h1>
  <p class="subtitle" id="menu-subtitle"></p>

  <div class="layout-row" id="layout-row">
    <button class="layout-btn" data-lid="asuka123" onclick="switchLayout('asuka123')">飛鳥123</button>
    <button class="layout-btn" data-lid="nicola"   onclick="switchLayout('nicola')">NICOLA</button>
    <button class="layout-btn" data-lid="naginata" onclick="switchLayout('naginata')">薙刀式 v16</button>
  </div>
  <p class="layout-desc" id="layout-desc"></p>

  <div class="size-row">
    問題数（ランダム練習）:
    <button onclick="setSize(10)">10</button>
    <button onclick="setSize(20)">20</button>
    <button onclick="setSize(30)">30</button>
    <button onclick="setSize(50)">50</button>
  </div>

  <div class="menu-section">
    <div class="menu-sec-hd">ランダム練習</div>
    <div class="lesson-grid" id="lesson-grid"></div>
  </div>

  <div class="menu-section">
    <div class="menu-sec-hd">文章練習</div>
    <div class="size-row" id="tsize-row">
      テキスト数:
      <button onclick="setTextSize(3)">3</button>
      <button onclick="setTextSize(5)">5</button>
      <button onclick="setTextSize(10)">10</button>
      <button onclick="setTextSize(20)">20</button>
    </div>
    <div class="text-grid" id="text-grid"></div>
  </div>

  <div class="menu-section">
    <div class="menu-sec-hd">弱点補習</div>
    <div class="weak-chips" id="weak-chips"></div>
    <div class="ctrl-row">
      <button class="btn primary" id="weak-start-btn" onclick="startWeaknessDrill()">弱点補習を始める</button>
      <button class="btn" id="weak-clear-btn" onclick="clearWeakness()">データクリア</button>
    </div>
  </div>
</div>

<!-- ══════════ PRACTICE ══════════ -->
<div id="screen-practice" class="screen" style="display:none">
  <div class="prac-header">
    <span class="prac-title" id="prac-title"></span>
    <span class="prac-progress" id="prac-prog"></span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar"></div></div>

  <div class="text-ctx-box" id="text-ctx" style="display:none"></div>

  <div class="challenge-box" id="cbox">
    <div class="target-kana" id="tgt-kana">　</div>
  </div>
  <div class="hint-text" id="hint"></div>

  <div class="thumb-row">
    <div class="thumb-ind" id="ind-l">無変換 ← 左親指</div>
    <div class="thumb-ind" id="ind-r">右親指 → 変換</div>
  </div>

  <div id="keyboard"></div>

  <div class="sess-stats">
    正解率: <b id="s-acc">－</b>&ensp;速度: <b id="s-cpm">－</b> CPM
  </div>
  <div class="ctrl-row">
    <button class="btn" onclick="toggleHint()">ヒント: <span id="hint-lbl">ON</span></button>
    <button class="btn" id="sound-btn" onclick="toggleSound()">音: <span id="sound-lbl">ON</span></button>
    <button class="btn" onclick="goMenu()">メニューへ</button>
  </div>
</div>

<!-- ══════════ STATS ══════════ -->
<div id="screen-stats" class="screen" style="display:none">
  <div class="result-card">
    <h2>セッション結果</h2>
    <div class="big-nums">
      <div><div class="big-num-val" id="r-acc">0%</div><div class="big-num-lbl">正解率</div></div>
      <div><div class="big-num-val" id="r-cpm">0</div><div class="big-num-lbl">CPM</div></div>
    </div>
    <div class="result-sub" id="r-sub"></div>
    <div class="err-box" id="r-errs"></div>
  </div>
  <div class="chart-wrap" id="chart-wrap" style="display:none">
    <div class="chart-hd">CPM 推移（直近最大100回）</div>
    <canvas id="cpm-chart" width="720" height="150"></canvas>
  </div>
  <div class="ctrl-row">
    <button class="btn primary" onclick="replayLesson()">もう一度</button>
    <button class="btn" onclick="goMenu()">メニューへ</button>
  </div>
</div>

<script>
'use strict';

// ── Layout definitions ────────────────────────────────────────────────────────

const PHYS = {
  KeyQ:'Q', KeyW:'W', KeyE:'E', KeyR:'R', KeyT:'T',
  KeyY:'Y', KeyU:'U', KeyI:'I', KeyO:'O', KeyP:'P', BracketLeft:'[',
  KeyA:'A', KeyS:'S', KeyD:'D', KeyF:'F', KeyG:'G',
  KeyH:'H', KeyJ:'J', KeyK:'K', KeyL:'L', Semicolon:';', Quote:"'",
  KeyZ:'Z', KeyX:'X', KeyC:'C', KeyV:'V', KeyB:'B',
  KeyN:'N', KeyM:'M', Comma:',', Period:'.', Slash:'/',
};

const LAYOUTS = {

  // ── 飛鳥123 ──────────────────────────────────────────────────────────────
  asuka123: {
    name: '飛鳥123',
    desc: '親指シフト系 かな配列。左親指: 無変換、右親指: 変換',
    thumbMode: 'lr',
    keys: {
      KeyQ: { n:'「', l:'ぱ', r:'（' },
      KeyW: { n:'ー', l:'え', r:'べ' },
      KeyE: { n:'じ', l:'ね', r:'れ' },
      KeyR: { n:'ぴ', l:'ぁ', r:'ぺ' },
      KeyT: { n:'%',  l:'ぅ', r:'&'  },
      KeyY: { n:'－', l:'ぇ', r:'ぢ' },
      KeyU: { n:'・', l:'ぃ', r:'～' },
      KeyI: { n:'と', l:'よ', r:'そ' },
      KeyO: { n:'は', l:'ふ', r:'こ' },
      KeyP: { n:'ぽ', l:'！', r:'ぞ' },
      BracketLeft: { n:'」', l:'）', r:'ご' },
      KeyA: { n:'き', l:'だ', r:'わ' },
      KeyS: { n:'し', l:'ち', r:'お' },
      KeyD: { n:'う', l:'あ', r:'な' },
      KeyF: { n:'て', l:'り', r:'ら' },
      KeyG: { n:'ぎ', l:'ぉ', r:'づ' },
      KeyH: { n:'ゆ', l:'ず', r:'ぬ' },
      KeyJ: { n:'ん', l:'る', r:'く' },
      KeyK: { n:'い', l:'す', r:'の' },
      KeyL: { n:'か', l:'ま', r:'つ' },
      Semicolon: { n:'た', l:'で', r:'さ' },
      Quote:     { n:'ほ', l:'げ', r:'ろ' },
      KeyZ: { n:'ば', l:'ぜ', r:'ぷ' },
      KeyX: { n:'け', l:'ひ', r:'ぐ' },
      KeyC: { n:'に', l:'せ', r:'み' },
      KeyV: { n:'ぶ', l:'び', r:'ざ' },
      KeyB: { n:'へ', l:'ヴ', r:'＊' },
      KeyN: { n:'ゃ', l:'や', r:'む' },
      KeyM: { n:'っ', l:'が', r:'を' },
      Comma:  { n:'ょ', l:'、', r:'ど' },
      Period: { n:'ゅ', l:'。', r:'も' },
      Slash:  { n:'め', l:'？', r:'ぼ' },
    },
    homeRow: ['KeyA','KeyS','KeyD','KeyF','KeyG','KeyH','KeyJ','KeyK','KeyL','Semicolon','Quote'],
  },

  // ── NICOLA（親指シフト / JIS X 6004） ────────────────────────────────────
  nicola: {
    name: 'NICOLA',
    desc: '親指シフト配列（JIS X 6004）。左親指: 無変換、右親指: 変換',

// ── Dynamic layout state ──────────────────────────────────────────────────────
let CL = null;         // current layout object
let KANA_MAP = {};     // kana → { code, s }  (s: 'n'|'l'|'r'|'combo')
let LESSONS = [];

function isKana(c) {
  if (!c) return false;
  const cp = c.codePointAt(0);
  return (cp >= 0x3041 && cp <= 0x3096) ||
         (cp >= 0x30A1 && cp <= 0x30FA) ||
         cp === 0x30FC;
}

function buildKanaMap() {
  KANA_MAP = {};
  for (const [code, e] of Object.entries(CL.keys)) {
    for (const s of ['n','l','r']) {
      const ch = e[s];
      if (ch && isKana(ch)) KANA_MAP[ch] = { code, s };
    }
  }
  // Combo entries (voiced sounds)
  if (CL.comboMap) {
    for (const [combo, kana] of Object.entries(CL.comboMap)) {
      if (!kana || !isKana(kana)) continue;
      const idx = combo.indexOf(':');
      const comboCode = combo.slice(0, idx);
      const mainCode  = combo.slice(idx + 1);
      KANA_MAP[kana] = { code: mainCode, s: 'combo', comboCode };
    }
  }
}

function buildLessons() {
  const homeRow = CL.homeRow || [];
  const allKana = Object.keys(KANA_MAP);

  // Home row: normal only
  const homeN = homeRow
    .map(c => CL.keys[c]?.n)
    .filter(isKana);

  // Home row: all (normal + shift + voiced combos on home row keys)
  const homeAll = [...new Set([
    ...homeRow.map(c => CL.keys[c]?.n).filter(isKana),
    ...homeRow.map(c => CL.keys[c]?.l).filter(isKana),
    ...homeRow.map(c => CL.keys[c]?.r).filter(isKana),
    ...(CL.comboMap
      ? Object.entries(CL.comboMap)
          .filter(([k]) => homeRow.includes(k.slice(k.indexOf(':') + 1)))
          .map(([, v]) => v)
          .filter(isKana)
      : []),
  ])];

  // All normal only
  const allN = [...new Set(
    Object.values(CL.keys).map(e => e.n).filter(isKana)
  )];

  LESSONS = [
    { title: 'ホーム段（全シフト）', chars: homeAll, primary: true  },
    { title: '全キー（全シフト）',   chars: allKana, primary: true  },
    { title: 'ホーム段（通常のみ）', chars: homeN,   primary: false },
    { title: '全キー（通常のみ）',   chars: allN,    primary: false },
  ];
}

function switchLayout(id) {
  S.layoutId = id;
  CL = LAYOUTS[id];
  buildKanaMap();
  buildLessons();
  buildKeyboard();
  renderMenu();
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

function playSound(ok) {
  if (!S.soundOn) return;
  try {
    const ac = getAC();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    if (ok) {
      osc.type = 'triangle';
      osc.frequency.value = 1320;
      g.gain.setValueAtTime(0.18, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.07);
    } else {
      osc.type = 'sawtooth';
      osc.frequency.value = 160;
      g.gain.setValueAtTime(0.12, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.15);
    }
  } catch(_) {}
}

// ── Keyboard DOM ──────────────────────────────────────────────────────────────
const KB_ROWS = [
  ['KeyQ','KeyW','KeyE','KeyR','KeyT','KeyY','KeyU','KeyI','KeyO','KeyP','BracketLeft'],
  ['KeyA','KeyS','KeyD','KeyF','KeyG','KeyH','KeyJ','KeyK','KeyL','Semicolon','Quote'],
  ['KeyZ','KeyX','KeyC','KeyV','KeyB','KeyN','KeyM','Comma','Period','Slash'],
];

const KEL = {};

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  // Clear old references
  for (const k of Object.keys(KEL)) delete KEL[k];

  const isCenter = CL.thumbMode === 'center';

  for (const row of KB_ROWS) {
    const div = document.createElement('div');
    div.className = 'kb-row';
    for (const code of row) {
      const e = CL.keys[code];
      const k = document.createElement('div');
      k.dataset.code = code;

      if (!e || (!e.n && !e.l && !e.r)) {
        k.className = 'kb-key kb-empty';
        k.innerHTML = `<span class="kb-phys">${PHYS[code]||''}</span>`;
      } else if (isCenter) {
        k.className = 'kb-key cs';
        k.innerHTML =
          `<span class="kb-phys">${PHYS[code]||''}</span>` +
          `<span class="kb-n">${e.n||''}</span>` +
          `<span class="kb-r">${e.l||''}</span>`;
      } else {
        k.className = 'kb-key';
        k.innerHTML =
          `<span class="kb-phys">${PHYS[code]||''}</span>` +
          `<span class="kb-l">${e.l||''}</span>` +
          `<span class="kb-n">${e.n||''}</span>` +
          `<span class="kb-r">${e.r||''}</span>`;
      }

      KEL[code] = k;
      div.appendChild(k);
    }
    kb.appendChild(div);
  }

  // Thumb row
  const tr = document.createElement('div');
  tr.className = 'kb-row';

  const muhan = document.createElement('div');
  muhan.className = 'kb-key k-thumb';
  muhan.dataset.code = 'NonConvert';
  muhan.innerHTML = isCenter
    ? 'シフト<small>無変換</small>'
    : '無変換<small>左親指</small>';
  KEL['NonConvert'] = muhan;

  const spaceKey = document.createElement('div');
  spaceKey.className = 'kb-key k-space';
  spaceKey.textContent = 'Space';

  const henko = document.createElement('div');
  henko.className = 'kb-key k-thumb';
  henko.dataset.code = 'Convert';
  henko.innerHTML = isCenter
    ? 'シフト<small>変換</small>'
    : '変換<small>右親指</small>';
  KEL['Convert'] = henko;

  tr.appendChild(muhan);
  tr.appendChild(spaceKey);
  tr.appendChild(henko);
  kb.appendChild(tr);

  // Update thumb indicators in practice screen
  const indL = document.getElementById('ind-l');
  const indR = document.getElementById('ind-r');
  if (indL) indL.textContent = isCenter ? 'シフト（無変換）' : '無変換 ← 左親指';
  if (indR) indR.textContent = isCenter ? 'シフト（変換）'   : '右親指 → 変換';
}

function renderKB() {
  const TGT_CLS = ['tgt','m-n','m-l','m-r','hl-left','hl-right'];
  for (const el of Object.values(KEL)) el.classList.remove(...TGT_CLS);

  const indL = document.getElementById('ind-l');
  const indR = document.getElementById('ind-r');
  indL.classList.remove('lit-left','req');
  indR.classList.remove('lit-right','req');

  const isCenter = CL.thumbMode === 'center';
  const lHeld = S.heldKeys.has('NonConvert');
  const rHeld = S.heldKeys.has('Convert');

  if (isCenter) {
    const shiftHeld = lHeld || rHeld;
    if (lHeld) { KEL['NonConvert']?.classList.add('hl-left');  indL.classList.add('lit-left'); }
    if (rHeld) { KEL['Convert']?.classList.add('hl-right');    indR.classList.add('lit-right'); }
    if (!shiftHeld) {} // no highlight needed
  } else {
    if (lHeld) { KEL['NonConvert']?.classList.add('hl-left');  }
    if (rHeld) { KEL['Convert']?.classList.add('hl-right');    }
    indL.classList.toggle('lit-left',  lHeld);
    indR.classList.toggle('lit-right', rHeld);
  }

  if (!S.tgtKey || !S.showHint) return;

  if (S.tgtKey.s === 'combo') {
    // Highlight both combo modifier key and main key
    KEL[S.tgtKey.comboCode]?.classList.add('tgt', 'm-n');
    KEL[S.tgtKey.code]?.classList.add('tgt', 'm-n');
    return;
  }

  const tgtEl = KEL[S.tgtKey.code];
  if (tgtEl) {
    tgtEl.classList.add('tgt',
      S.tgtKey.s === 'n' ? 'm-n' : S.tgtKey.s === 'l' ? 'm-l' : 'm-r');
  }

  if (S.tgtKey.s === 'l') {
    KEL['NonConvert']?.classList.add('hl-left');
    indL.classList.add('lit-left', 'req');
    if (isCenter) { KEL['Convert']?.classList.add('hl-right'); indR.classList.add('lit-right','req'); }
  } else if (S.tgtKey.s === 'r') {
    if (isCenter) {
      KEL['NonConvert']?.classList.add('hl-left');
      KEL['Convert']?.classList.add('hl-right');
      indL.classList.add('lit-left', 'req');
      indR.classList.add('lit-right', 'req');
    } else {
      KEL['Convert']?.classList.add('hl-right');
      indR.classList.add('lit-right', 'req');
    }
  }
}

function flashKey(code, ok) {
  const el = KEL[code];
  if (!el) return;
  const cls = ok ? 'fl-ok' : 'fl-err';
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), ok ? 160 : 300);
}

// ── Queue ─────────────────────────────────────────────────────────────────────
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue(chars, size) {
  const pool = [];
  const q = [];
  let last = null;
  while (q.length < size) {
    if (!pool.length) pool.push(...shuffle([...chars]));
    if (pool[0] === last && pool.length > 1) [pool[0], pool[1]] = [pool[1], pool[0]];
    last = pool.shift();
    q.push(last);
  }
  return q;
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startLesson(idx) {
  const lesson = LESSONS[idx];
  S.mode = 'random';
  S.lessonIdx = idx;
  S.queue = buildQueue(lesson.chars, S.sessionSize);
  S.pos = 0;
  S.showHint = lesson.primary;
  S.heldKeys.clear();
  clearPending();
  S.stats = { total:0, correct:0, msSum:0, errs:{}, t0: performance.now() };

  document.getElementById('prac-title').textContent = `${CL.name} レッスン${idx+1}: ${lesson.title}`;
  document.getElementById('hint-lbl').textContent = S.showHint ? 'ON' : 'OFF';
  const tc = document.getElementById('text-ctx');
  tc.style.display = 'none';
  tc.classList.remove('text-large');
  document.getElementById('cbox').style.display = '';
  showScreen('practice');
  if (document.activeElement) document.activeElement.blur();
  nextChallenge();
}

function startTextGroup(groupIdx) {
  const group = TEXT_GROUPS[groupIdx];
  const pool = group.all
    ? TEXT_GROUPS.filter(g => !g.all).flatMap(g => g.texts)
    : group.texts;

  let roundBuf = shuffle([...pool]);
  const queue = [];
  const segs = [];

  // S.textSize = number of complete texts (sentences) to practice
  let taken = 0;
  while (taken < S.textSize) {
    if (!roundBuf.length) roundBuf = shuffle([...pool]);
    const txt = roundBuf.shift();
    const filtered = [...txt.text].filter(c => KANA_MAP[c]);
    if (!filtered.length) continue;
    const startInQueue = queue.length;
    queue.push(...filtered);
    segs.push({ title: txt.title, text: txt.text, filteredChars: filtered, startInQueue });
    taken++;
  }

  S.mode = 'text';
  S.textGroupIdx = groupIdx;
  S.textSegs = segs;
  S.queue = queue;
  S.pos = 0;
  S.showHint = true;
  S.heldKeys.clear();
  clearPending();
  S.stats = { total:0, correct:0, msSum:0, errs:{}, t0: performance.now() };

  document.getElementById('prac-title').textContent = `${CL.name} 文章練習: ${group.title}`;
  document.getElementById('hint-lbl').textContent = 'ON';
  const tc2 = document.getElementById('text-ctx');
  tc2.style.display = '';
  tc2.classList.add('text-large');
  document.getElementById('cbox').style.display = 'none';
  showScreen('practice');
  if (document.activeElement) document.activeElement.blur();
  nextChallenge();
}

// ── Practice flow ─────────────────────────────────────────────────────────────
function nextChallenge() {
  if (S.pos >= S.queue.length) { endSession(); return; }

  S.tgtKana = S.queue[S.pos];
  S.tgtKey  = KANA_MAP[S.tgtKana];
  S.firstKey = false;
  S.hadWrong = false;
  S.tStart   = 0;

  const n = S.queue.length;
  if (S.mode === 'text') {
    let si = 0;
    for (let i = 0; i < S.textSegs.length; i++) {
      if (S.pos >= S.textSegs[i].startInQueue) si = i;
    }
    document.getElementById('prac-prog').textContent = `テキスト ${si + 1} / ${S.textSegs.length}`;
    document.getElementById('pbar').style.width = `${(si / S.textSegs.length) * 100}%`;
  } else {
    document.getElementById('prac-prog').textContent = `${S.pos + 1} / ${n}`;
    document.getElementById('pbar').style.width = `${(S.pos / n) * 100}%`;
  }
  document.getElementById('tgt-kana').textContent = S.tgtKana;
  document.getElementById('cbox').classList.remove('ok','err');

  if (S.mode === 'text') updateTextCtx();
  updateHint();
  updateSessStats();
  renderKB();
}

function updateTextCtx() {
  const el = document.getElementById('text-ctx');
  let seg = S.textSegs[S.textSegs.length - 1];
  for (const s of S.textSegs) {
    if (S.pos < s.startInQueue + s.filteredChars.length) { seg = s; break; }
  }
  const localPos = S.pos - seg.startInQueue;
  let html = `<div style="font-size:0.68rem;color:var(--text-dim);margin-bottom:3px">${seg.title}</div>`;
  let fi = 0;
  for (const c of seg.text) {
    if (!KANA_MAP[c]) { html += `<span class="tc-todo">${c}</span>`; continue; }
    if (fi < localPos)        html += `<span class="tc-done">${c}</span>`;
    else if (fi === localPos) html += `<span class="tc-cur">${c}</span>`;
    else                      html += `<span class="tc-todo">${c}</span>`;
    fi++;
  }
  el.innerHTML = html;
}

function updateHint() {
  const el = document.getElementById('hint');
  if (!S.showHint || !S.tgtKey) { el.innerHTML = ''; return; }

  const tk = S.tgtKey;

  if (tk.s === 'combo') {
    const lbl1 = PHYS[tk.comboCode] || tk.comboCode;
    const lbl2 = PHYS[tk.code] || tk.code;
    el.innerHTML = `<span class="hk">${lbl1}</span> ＋ <span class="hk">${lbl2}</span> <span style="font-size:0.78rem">（同時）</span>`;
    return;
  }

  const lbl = PHYS[tk.code] || tk.code;
  let html = '';
  if (tk.s === 'l' || tk.s === 'r') {
    if (CL.thumbMode === 'center') {
      html = `<span class="hk">シフト</span> ＋ <span class="hk">${lbl}</span>`;
    } else if (tk.s === 'l') {
      html = `<span class="hk">無変換</span> ＋ <span class="hk">${lbl}</span>`;
    } else {
      html = `<span class="hk">変換</span> ＋ <span class="hk">${lbl}</span>`;
    }
  } else {
    html = `<span class="hk">${lbl}</span>`;
  }
  el.innerHTML = html;
}

function updateSessStats() {
  const { total, correct, msSum } = S.stats;
  if (!total) {
    document.getElementById('s-acc').textContent = '－';
    document.getElementById('s-cpm').textContent = '－';
    return;
  }
  document.getElementById('s-acc').textContent = `${Math.round(correct/total*100)}%`;
  document.getElementById('s-cpm').textContent =
    msSum > 0 ? Math.round(correct/msSum*60000) : '－';
}

function evaluate(code, shift, comboCode) {
  if (!S.tgtKey) return;

  const now = performance.now();
  if (!S.firstKey) { S.firstKey = true; S.tStart = now; }

  let ok;
  if (S.tgtKey.s === 'combo') {
    ok = code === S.tgtKey.code && comboCode === S.tgtKey.comboCode;
  } else {
    ok = code === S.tgtKey.code && shift === S.tgtKey.s;
  }

  if (ok) {
    const elapsed = now - S.tStart;
    S.stats.total++;
    S.stats.msSum += elapsed;
    if (!S.hadWrong) S.stats.correct++;
    else S.stats.errs[S.tgtKana] = (S.stats.errs[S.tgtKana] || 0) + 1;

    S.tgtKey = null;
    playSound(true);
    flashKey(code, true);
    if (comboCode) flashKey(comboCode, true);
    document.getElementById('cbox').classList.add('ok');
    S.pos++;
    setTimeout(() => { if (S.screen === 'practice') nextChallenge(); }, 130);
  } else {
    S.hadWrong = true;
    S.stats.errs[S.tgtKana] = (S.stats.errs[S.tgtKana] || 0) + 1;
    playSound(false);
    flashKey(code, false);
    const cbox = document.getElementById('cbox');
    cbox.classList.add('err');
    setTimeout(() => cbox.classList.remove('err'), 300);
  }
}

function endSession() {
  const { total, correct, msSum, errs } = S.stats;
  const acc = total ? Math.round(correct/total*100) : 0;
  const cpm = msSum > 0 ? Math.round(correct/msSum*60000) : 0;

  document.getElementById('r-acc').textContent = `${acc}%`;
  document.getElementById('r-cpm').textContent = cpm;
  document.getElementById('r-sub').textContent = `正解 ${correct} / ${total} 問`;

  const errEntries = Object.entries(errs).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const erEl = document.getElementById('r-errs');
  if (!errEntries.length) {
    erEl.innerHTML = '<span style="color:var(--green)">ミスなし！完璧です</span>';
  } else {
    erEl.innerHTML = '<h3>苦手な文字</h3>' +
      errEntries.map(([k,v]) =>
        `<span class="err-chip">${k}<span class="err-cnt">×${v}</span></span>`
      ).join('');
  }

  const pfx = S.layoutId;
  const histKey = S.mode === 'weakness' ? `${pfx}_weak` :
                  S.mode === 'random'   ? `${pfx}_l${S.lessonIdx}` :
                                          `${pfx}_tg${S.textGroupIdx}`;
  if (S.mode === 'random')    saveProgress(`${pfx}_l${S.lessonIdx}`,    acc, cpm);
  else if (S.mode === 'text') saveProgress(`${pfx}_tg${S.textGroupIdx}`, acc, cpm);
  saveSessionHistory(histKey, cpm);
  saveErrCumulative(pfx, errs);
  showScreen('stats');
  drawCpmChart(histKey);
}

// ── Input handling ────────────────────────────────────────────────────────────
function clearPending() {
  if (S.pendingChar) { clearTimeout(S.pendingChar.tid); S.pendingChar = null; }
  S.pendingThumb = null;
}

function onKeyDown(e) {
  if (S.screen !== 'practice') return;
  if (e.repeat) return;

  if (e.isComposing) {
    document.getElementById('ime-warn').style.display = 'block';
    return;
  }

  const code = e.code;
  const now  = performance.now();

  // ── Thumb / shift keys ─────────────────────────────────────────────────────
  if (code === 'NonConvert' || code === 'Convert') {
    e.preventDefault();
    S.heldKeys.add(code);

    if (S.pendingChar && (now - S.pendingChar.time) <= WINDOW_MS) {
      clearTimeout(S.pendingChar.tid);
      const shift = resolveThumbShift(code);
      evaluate(S.pendingChar.code, shift);
      S.pendingChar = null;
    } else {
      S.pendingThumb = { code, time: now };
    }

    renderKB();
    return;
  }

  // ── Regular kana key ───────────────────────────────────────────────────────
  if (!CL.keys[code]) return;
  e.preventDefault();

  // Check 2-kana simultaneous combo (voiced sounds in 薙刀式), or flush pending
  if (S.pendingChar && S.pendingChar.code !== code) {
    if (CL.comboMap && (now - S.pendingChar.time) <= WINDOW_MS) {
      const fwd = CL.comboMap[`${S.pendingChar.code}:${code}`];
      const rev = CL.comboMap[`${code}:${S.pendingChar.code}`];
      const voiced = fwd || rev;
      if (voiced && isKana(voiced)) {
        clearTimeout(S.pendingChar.tid);
        const comboCode = fwd ? S.pendingChar.code : code;
        const mainCode  = fwd ? code : S.pendingChar.code;
        evaluate(mainCode, 'combo', comboCode);
        S.pendingChar = null;
        return;
      }
    }
    clearTimeout(S.pendingChar.tid);
    evaluate(S.pendingChar.code, 'n');
    S.pendingChar = null;
  }

  // Thumb held down (long press)
  if (S.heldKeys.has('Convert')) {
    evaluate(code, resolveThumbShift('Convert')); return;
  }
  if (S.heldKeys.has('NonConvert')) {
    evaluate(code, resolveThumbShift('NonConvert')); return;
  }

  // Pending thumb (thumb came first, within window)
  if (S.pendingThumb && (now - S.pendingThumb.time) <= WINDOW_MS) {
    const shift = resolveThumbShift(S.pendingThumb.code);
    evaluate(code, shift);
    S.pendingThumb = null;
    return;
  }

  // Plain key → wait for possible simultaneous thumb
  const tid = setTimeout(() => {
    if (S.pendingChar && S.pendingChar.code === code) {
      evaluate(code, 'n');
      S.pendingChar = null;
    }
  }, WINDOW_MS);
  S.pendingChar = { code, time: now, tid };
}

function resolveThumbShift(thumbCode) {
  if (CL.thumbMode === 'center') return 'l'; // l===r for center shift layouts
  return thumbCode === 'Convert' ? 'r' : 'l';
}

function onKeyUp(e) {
  S.heldKeys.delete(e.code);
  if (e.code === 'NonConvert' || e.code === 'Convert') {
    e.preventDefault();
    if (!(CL.thumbMode === 'center' && (S.heldKeys.has('NonConvert') || S.heldKeys.has('Convert')))) {
      S.pendingThumb = null;
    }
    if (S.screen === 'practice') renderKB();
  }
}

// ── Screen / UI ───────────────────────────────────────────────────────────────
function showScreen(name) {
  S.screen = name;
  document.getElementById('screen-menu').style.display     = name==='menu'     ? '' : 'none';
  document.getElementById('screen-practice').style.display = name==='practice' ? '' : 'none';
  document.getElementById('screen-stats').style.display    = name==='stats'    ? '' : 'none';
}

function renderMenu() {
  // Layout buttons
  document.querySelectorAll('.layout-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lid === S.layoutId);
  });
  document.getElementById('layout-desc').textContent = CL.desc;
  document.getElementById('menu-title').textContent = `${CL.name} 練習`;
  document.getElementById('menu-subtitle').textContent =
    CL.thumbMode === 'center'
      ? 'PCキーボード必須　／　シフト: 無変換 または 変換'
      : 'PCキーボード必須　／　左親指シフト: 無変換　／　右親指シフト: 変換';

  // ── Random lessons ──
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  LESSONS.forEach((lesson, i) => {
    const best = loadProgress(`${S.layoutId}_l${i}`);
    const b = document.createElement('button');
    b.className = 'lesson-btn' + (lesson.primary ? ' primary' : '');
    b.innerHTML =
      `<div><span class="lesson-num">${i+1}</span>${lesson.title}</div>` +
      `<div class="lesson-best">${best ? `ベスト: ${best.acc}% / ${best.cpm} CPM (${best.d})` : 'まだ未挑戦'}</div>`;
    b.onclick = () => startLesson(i);
    grid.appendChild(b);
  });

  // ── Text practice groups ──
  const tgrid = document.getElementById('text-grid');
  tgrid.innerHTML = '';
  TEXT_GROUPS.forEach((group, i) => {
    const best = loadProgress(`${S.layoutId}_tg${i}`);
    const count = group.all
      ? TEXT_GROUPS.filter(g => !g.all).reduce((s, g) => s + g.texts.length, 0)
      : group.texts.length;
    const b = document.createElement('button');
    b.className = 'text-btn';
    b.innerHTML =
      `<div style="font-weight:bold">${group.title} <span class="text-len">(${count}本)</span></div>` +
      `<div class="text-preview">${group.desc}</div>` +
      `<div class="lesson-best">${best ? `ベスト: ${best.acc}% / ${best.cpm} CPM (${best.d})` : 'まだ未挑戦'}</div>`;
    b.onclick = () => startTextGroup(i);
    tgrid.appendChild(b);
  });

  // ── Weakness section ──
  const cum     = loadErrCumulative(S.layoutId);
  const wEntries = Object.entries(cum)
    .filter(([ch]) => KANA_MAP[ch])
    .sort((a, b) => b[1] - a[1])
    .slice(0, 12);
  const wChips  = document.getElementById('weak-chips');
  const wBtn    = document.getElementById('weak-start-btn');
  const wClear  = document.getElementById('weak-clear-btn');
  if (!wEntries.length) {
    wChips.innerHTML = '<span class="weak-none">まだデータがありません。練習するとここに苦手文字が表示されます。</span>';
    wBtn.disabled = true; wBtn.style.opacity = '0.4';
    wClear.style.display = 'none';
  } else {
    wChips.innerHTML = wEntries.map(([ch, cnt]) =>
      `<span class="weak-chip">${ch}<span class="weak-cnt">×${cnt}</span></span>`
    ).join('');
    const canDrill = wEntries.length >= 3;
    wBtn.disabled = !canDrill; wBtn.style.opacity = canDrill ? '' : '0.4';
    wClear.style.display = '';
  }

  // Size buttons
  document.querySelectorAll('#screen-menu .size-row:first-of-type button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === S.sessionSize);
  });
  document.querySelectorAll('#tsize-row button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === S.textSize);
  });
}

function setSize(n)     { S.sessionSize = n; renderMenu(); }
function setTextSize(n) { S.textSize    = n; renderMenu(); }

function goMenu() {
  clearPending();
  S.heldKeys.clear();
  showScreen('menu');
  renderMenu();
}

function replayLesson() {
  if (S.mode === 'text')          startTextGroup(S.textGroupIdx);
  else if (S.mode === 'weakness') startWeaknessDrill();
  else                            startLesson(S.lessonIdx);
}

function toggleHint() {
  S.showHint = !S.showHint;
  document.getElementById('hint-lbl').textContent = S.showHint ? 'ON' : 'OFF';
  updateHint();
  renderKB();
}

// ── localStorage ──────────────────────────────────────────────────────────────
function saveProgress(key, acc, cpm) {
  try {
    const k = `a123_${key}`;
    const prev = JSON.parse(localStorage.getItem(k) || 'null');
    if (!prev || acc > prev.acc || (acc === prev.acc && cpm > prev.cpm)) {
      const d = new Date().toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' });
      localStorage.setItem(k, JSON.stringify({ acc, cpm, d }));
    }
  } catch(_) {}
}

function loadProgress(key) {
  try { return JSON.parse(localStorage.getItem(`a123_${key}`) || 'null'); }
  catch(_) { return null; }
}

// ── Session history (CPM chart) ───────────────────────────────────────────────
function saveSessionHistory(key, cpm) {
  try {
    const k = `a123_hist_${key}`;
    const hist = JSON.parse(localStorage.getItem(k) || '[]');
    hist.push(cpm);
    if (hist.length > 100) hist.shift();
    localStorage.setItem(k, JSON.stringify(hist));
  } catch(_) {}
}

function loadHistory(key) {
  try { return JSON.parse(localStorage.getItem(`a123_hist_${key}`) || '[]'); }
  catch(_) { return []; }
}

// ── Cumulative errors (weakness drill) ───────────────────────────────────────
function saveErrCumulative(layoutId, errs) {
  if (!Object.keys(errs).length) return;
  try {
    const k = `a123_cum_${layoutId}`;
    const cum = JSON.parse(localStorage.getItem(k) || '{}');
    for (const [ch, cnt] of Object.entries(errs)) {
      cum[ch] = (cum[ch] || 0) + cnt;
    }
    localStorage.setItem(k, JSON.stringify(cum));
  } catch(_) {}
}

function loadErrCumulative(layoutId) {
  try { return JSON.parse(localStorage.getItem(`a123_cum_${layoutId}`) || '{}'); }
  catch(_) { return {}; }
}

function clearWeakness() {
  try { localStorage.removeItem(`a123_cum_${S.layoutId}`); } catch(_) {}
  renderMenu();
}

// ── CPM chart (Canvas) ────────────────────────────────────────────────────────
function drawCpmChart(histKey) {
  const hist = loadHistory(histKey);
  const wrap = document.getElementById('chart-wrap');
  if (hist.length < 2) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const canvas = document.getElementById('cpm-chart');
  const W = 720, H = 150;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const P = { t: 12, r: 16, b: 26, l: 42 };
  const cw = W - P.l - P.r, ch = H - P.t - P.b;

  const maxV = Math.max(...hist);
  const minV = Math.min(...hist);
  const range = maxV - minV || 1;

  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, W, H);

  // Grid lines + Y labels
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = P.t + (ch / 4) * i;
    ctx.strokeStyle = '#2a2a4a';
    ctx.beginPath(); ctx.moveTo(P.l, y); ctx.lineTo(W - P.r, y); ctx.stroke();
    const val = Math.round(maxV - (range / 4) * i);
    ctx.fillStyle = '#6272a4';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val, P.l - 4, y + 4);
  }

  // X labels
  const n = hist.length;
  const xStep = n <= 20 ? 5 : n <= 50 ? 10 : 20;
  ctx.fillStyle = '#6272a4'; ctx.textAlign = 'center';
  for (let i = 0; i < n; i += xStep) {
    const x = P.l + (i / (n - 1)) * cw;
    ctx.fillText(i + 1, x, H - 5);
  }

  const tx = i => P.l + (i / (n - 1)) * cw;
  const ty = v => P.t + (1 - (v - minV) / range) * ch;

  // Area fill
  ctx.beginPath();
  ctx.moveTo(tx(0), ty(hist[0]));
  for (let i = 1; i < n; i++) ctx.lineTo(tx(i), ty(hist[i]));
  ctx.lineTo(tx(n - 1), P.t + ch);
  ctx.lineTo(tx(0), P.t + ch);
  ctx.closePath();
  ctx.fillStyle = 'rgba(139,233,253,0.1)';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#8be9fd'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.moveTo(tx(0), ty(hist[0]));
  for (let i = 1; i < n; i++) ctx.lineTo(tx(i), ty(hist[i]));
  ctx.stroke();

  // Current session dot
  ctx.beginPath();
  ctx.arc(tx(n - 1), ty(hist[n - 1]), 5, 0, Math.PI * 2);
  ctx.fillStyle = '#f1fa8c'; ctx.fill();
}

// ── Weakness drill ────────────────────────────────────────────────────────────
function startWeaknessDrill() {
  const cum = loadErrCumulative(S.layoutId);
  const entries = Object.entries(cum)
    .filter(([ch]) => KANA_MAP[ch])
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15);
  if (entries.length < 3) return;

  const chars = entries.map(([ch]) => ch);
  S.mode = 'weakness';
  S.queue = buildQueue(chars, S.sessionSize);
  S.pos = 0;
  S.showHint = true;
  S.heldKeys.clear();
  clearPending();
  S.stats = { total:0, correct:0, msSum:0, errs:{}, t0: performance.now() };

  document.getElementById('prac-title').textContent = `${CL.name} 弱点補習`;
  document.getElementById('hint-lbl').textContent = 'ON';
  const tc = document.getElementById('text-ctx');
  tc.style.display = 'none';
  tc.classList.remove('text-large');
  document.getElementById('cbox').style.display = '';
  showScreen('practice');
  if (document.activeElement) document.activeElement.blur();
  nextChallenge();
}

// ── Sound toggle ──────────────────────────────────────────────────────────────
function toggleSound() {
  S.soundOn = !S.soundOn;
  document.getElementById('sound-lbl').textContent = S.soundOn ? 'ON' : 'OFF';
  try { localStorage.setItem('a123_sound', S.soundOn ? '1' : '0'); } catch(_) {}
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Sound preference
  const savedSound = localStorage.getItem('a123_sound');
  if (savedSound !== null) S.soundOn = savedSound === '1';
  document.getElementById('sound-lbl').textContent = S.soundOn ? 'ON' : 'OFF';

  // Initialize with 飛鳥123
  CL = LAYOUTS['asuka123'];
  buildKanaMap();
  buildLessons();
  buildKeyboard();
  renderMenu();

  document.addEventListener('keydown', onKeyDown);
  document.addEventListener('keyup',   onKeyUp);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      S.heldKeys.clear();
      clearPending();
      if (S.screen === 'practice') renderKB();
    }
  });

  document.addEventListener('keydown', () => {
    const w = document.getElementById('ime-warn');
    if (w.style.display !== 'none') w.style.display = 'none';
  }, { capture: true, passive: true });
});
</script>
